<style>
  html, body { margin: 0; padding: 0; background: #ece3d4; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }
  input, select, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(38,35,32,0.12); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(38,35,32,0.22); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes icPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.45; transform: scale(0.7); } }
  @keyframes icSlide { 0% { left: -40%; } 100% { left: 100%; } }
  .ic-drop[data-drag="1"] { background: #f4e9d6 !important; border-color: #9c4a2f !important; }
  select option { color: #262320; }
  @media (max-width: 720px) { .two-col { grid-template-columns: 1fr !important; } }
  @media (max-width: 940px) { .demo-grid { grid-template-columns: 1fr !important; } .demo-grid aside { position: static !important; } }
</style>
