  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

);\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"ec7885cc-b9f4-4850-bc97-9e324bfbbc18\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"2eed9216-ac70-4a80-b772-802896f4faff\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"4233d719-a1a1-4b6f-92f7-e01ecf445a51\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Young Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"1725a690-bcd1-4cd9-9d75-55ba9d528f74\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Young Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"a0cf5725-84a8-460a-8866-4eb7c968208e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Maurice — landing page styles\n   Warm parchment, Spectral serif display, boater-hat brand.\n   ============================================================ */\n\n:root{\n  --paper:#f1ece2;\n  --paper-2:#ebe4d6;\n  --card:#f8f4ec;\n  --card-2:#f3eee3;\n  --ink:#1b1a17;\n  --ink-2:#403d34;\n  --muted:#8a8475;\n  --muted-2:#b4ae9f;\n  --line:#dcd6c8;\n  --line-2:#cfc8b8;\n  --ochre:#cf7a12;\n  --ochre-deep:#a85d08;\n  --oxblood:#7c2d23;\n  --dark:#211f1a;\n  --dark-2:#2b281f;\n  --green:#2f7d54;\n\n  --serif:\"Spectral\",Georgia,\"Times New Roman\",serif;\n  --sans:-apple-system,BlinkMacSystemFont,\"SF Pro Text\",\"Segoe UI\",system-ui,sans-serif;\n  --mono:ui-monospace,\"SF Mono\",Menlo,monospace;\n\n  --maxw:1180px;\n  --gut:24px;\n}\n\n*{box-sizing:border-box;}\nhtml{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}\nbody{\n  margin:0;background:var(--paper);color:var(--ink);\n  font-family:var(--sans);font-size:17px;line-height:1.6;\n  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;\n}\nimg{max-width:100%;display:block;}\na{color:inherit;text-decoration:none;}\nh1,h2,h3{margin:0;font-family:var(--serif);font-weight:600;letter-spacing:-.01em;line-height:1.06;}\np{margin:0;text-wrap:pretty;}\n\n.wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--gut);}\n.eyebrow{\n  font-family:var(--mono);font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;\n  color:var(--ochre-deep);font-weight:600;margin-bottom:18px;\n}\n.section{padding:108px 0;}\n.section--alt{background:var(--paper-2);}\n.section-head{max-width:660px;margin:0 auto 64px;text-align:center;}\n.section-head.left{margin-left:0;text-align:left;}\n.section-head h2{font-size:clamp(30px,4.2vw,46px);}\n.section-head p{margin-top:18px;color:var(--ink-2);font-size:19px;}\n\n/* ---------- hat logomark (le melon — bowler) ---------- */\n.hatmark{width:1em;height:.74em;display:inline-block;vertical-align:-.06em;overflow:visible;}\n\n/* ---------- buttons ---------- */\n.btn{\n  display:inline-flex;align-items:center;gap:10px;justify-content:center;\n  font-family:var(--sans);font-size:16px;font-weight:600;letter-spacing:-.01em;\n  padding:14px 22px;border-radius:13px;border:1px solid transparent;cursor:pointer;\n  transition:transform .14s ease,background .16s ease,box-shadow .16s ease;white-space:nowrap;\n}\n.btn:active{transform:translateY(1px);}\n.btn-primary{background:var(--ink);color:var(--paper);box-shadow:0 8px 20px rgba(27,26,23,.16);}\n.btn-primary:hover{background:#000;box-shadow:0 12px 26px rgba(27,26,23,.22);}\n.btn-ghost{background:transparent;color:var(--ink);border-color:var(--line-2);}\n.btn-ghost:hover{background:var(--card);border-color:var(--muted-2);}\n.btn .ic{width:19px;height:19px;flex:0 0 auto;}\n.btn-sm{padding:10px 16px;font-size:14.5px;border-radius:11px;}\n\n/* ---------- nav ---------- */\n.nav{\n  position:sticky;top:0;z-index:50;background:rgba(241,236,226,.82);\n  backdrop-filter:saturate(140%) blur(12px);border-bottom:1px solid transparent;\n  transition:border-color .2s ease,background .2s ease;\n}\n.nav.scrolled{border-color:var(--line);background:rgba(241,236,226,.92);}\n.nav-in{display:flex;align-items:center;gap:24px;height:68px;}\n.brand{display:flex;align-items:center;gap:12px;font-family:\"Young Serif\",Georgia,serif;font-size:23px;font-weight:400;letter-spacing:-.01em;}\n.brand .hatmark{width:34px;height:25px;color:var(--ink);}\n.nav-links{display:flex;align-items:center;gap:30px;margin-left:14px;}\n.nav-links a{font-size:15px;color:var(--ink-2);font-weight:500;transition:color .15s ease;}\n.nav-links a:hover{color:var(--ink);}\n.nav-cta{margin-left:auto;display:flex;align-items:center;gap:12px;}\n.nav-toggle{display:none;}\n\n/* ---------- hero ---------- */\n.hero{padding:72px 0 96px;position:relative;overflow:hidden;}\n.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;}\n.hero h1{font-size:clamp(40px,6vw,70px);letter-spacing:-.02em;}\n.hero h1 em{font-style:italic;color:var(--oxblood);}\n.hero-promise{margin-top:24px;font-family:var(--serif);font-size:clamp(22px,2.4vw,26px);line-height:1.32;font-weight:500;color:var(--ink);font-style:italic;max-width:24ch;}\n.hero-sub{margin-top:16px;font-size:18px;line-height:1.58;color:var(--ink-2);max-width:48ch;}\n.hero-cta{display:flex;flex-wrap:wrap;gap:14px;margin-top:36px;}\n.hero-micro{margin-top:22px;font-family:var(--mono);font-size:12.5px;color:var(--muted);letter-spacing:.02em;}\n.hero-micro b{color:var(--ink-2);font-weight:600;}\n\n/* soft paper texture accents */\n.hero::before{\n  content:\"\";position:absolute;right:-12%;top:-18%;width:46%;height:120%;\n  background:radial-gradient(closest-side,rgba(207,122,18,.10),transparent 70%);\n  pointer-events:none;\n}\n\n/* ---------- device: phone ---------- */\n.phone{\n  width:344px;border-radius:46px;background:#1b1a17;padding:11px;\n  box-shadow:0 40px 80px -24px rgba(27,26,23,.5),0 0 0 1px rgba(0,0,0,.06);\n  position:relative;\n}\n.phone-screen{\n  background:var(--paper);border-radius:36px;overflow:hidden;position:relative;\n  height:712px;display:flex;flex-direction:column;\n}\n.phone-notch{\n  position:absolute;left:50%;top:11px;transform:translateX(-50%);z-index:6;\n  width:108px;height:30px;background:#000;border-radius:16px;\n}\n.hero-phone{display:flex;justify-content:center;position:relative;}\n.hero-phone .phone{transform:rotate(1.4deg);}\n\n/* generic in-app chrome used by phone mockups */\n.sbar{height:50px;display:flex;align-items:center;padding:0 24px;flex:0 0 auto;}\n.sbar .t{font-weight:600;font-size:15px;}\n.sbar .r{margin-left:auto;display:flex;gap:6px;align-items:center;}\n.sbar .r svg{width:17px;color:var(--ink);}\n.batt{width:24px;height:12px;border:1.5px solid var(--ink);border-radius:3.5px;position:relative;display:flex;padding:1.5px;}\n.batt::after{content:\"\";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:var(--ink);border-radius:0 1px 1px 0;}\n.batt i{background:var(--ink);border-radius:1px;width:75%;}\n\n.appbar{display:flex;align-items:center;gap:11px;padding:4px 16px 13px;border-bottom:1px solid rgba(0,0,0,.06);}\n.appbar .circ{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-2);flex:0 0 auto;}\n.appbar .circ svg{width:17px;}\n.appbar .ttl{flex:1;min-width:0;}\n.appbar .ttl h4{margin:0;font-family:var(--serif);font-weight:600;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}\n.appbar .ttl .meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px;}\n\n/* chat body */\n.chat{flex:1;overflow:hidden;padding:16px 18px;display:flex;flex-direction:column;gap:14px;}\n.bubble-u{align-self:flex-end;background:var(--ink);color:var(--paper);padding:11px 15px;border-radius:18px 18px 5px 18px;font-size:14.5px;max-width:80%;}\n.bubble-m{font-size:15px;line-height:1.5;color:var(--ink);}\n.bubble-m p{margin-bottom:10px;}\n.bubble-m .li{position:relative;padding-left:18px;margin-bottom:6px;}\n.bubble-m .li::before{content:\"\";position:absolute;left:4px;top:9px;width:5px;height:5px;border-radius:50%;background:var(--ink);}\n.kbd{font-family:var(--mono);font-size:.84em;background:var(--card-2);padding:1px 5px;border-radius:5px;}\n.datacard{border:1px solid var(--line);background:var(--card);border-radius:13px;padding:11px 13px;}\n.datacard .dc-h{font-family:var(--mono);font-size:10.5px;color:var(--ochre-deep);letter-spacing:.06em;margin-bottom:8px;text-transform:uppercase;}\n.datacard .dc-row{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;border-top:1px solid var(--line);}\n.datacard .dc-row:first-of-type{border-top:0;}\n.datacard .dc-row span:last-child{font-family:var(--mono);color:var(--ink-2);}\n\n/* composer row inside phone */\n.composer{flex:0 0 auto;margin:8px 12px 14px;background:var(--card);border:1px solid rgba(0,0,0,.05);border-radius:24px;padding:13px 13px 9px;box-shadow:0 6px 18px rgba(40,36,28,.07);}\n.composer .ph{font-size:15px;color:var(--muted-2);font-weight:500;padding:2px 4px 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}\n.composer .tools{display:flex;align-items:center;gap:13px;}\n.composer .tools svg{width:18px;color:var(--muted);}\n.composer .sp{flex:1;}\n.pill{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 9px 0 11px;border-radius:16px;border:1px solid var(--line);background:var(--paper);font-size:12.5px;font-weight:600;color:var(--ink);}\n.pill svg{width:12px;color:var(--muted);}\n.hatbtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--paper);position:relative;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}\n.hatbtn .hatmark{width:23px;height:17px;color:var(--ink);}\n.hatbtn .bdg{position:absolute;right:-2px;bottom:-2px;width:17px;height:17px;border-radius:50%;background:var(--ink);border:2px solid var(--card);display:flex;align-items:center;justify-content:center;}\n.hatbtn .bdg svg{width:9px;color:#fff;}\n\n/* ---------- spotlight rows ---------- */\n.spot{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}\n.spot + .spot{margin-top:104px;}\n.spot.flip .spot-media{order:2;}\n.spot-copy h3{font-size:clamp(26px,3.4vw,36px);}\n.spot-copy .eyebrow{margin-bottom:14px;}\n.spot-copy p{margin-top:18px;color:var(--ink-2);font-size:18px;}\n.spot-list{margin-top:22px;display:flex;flex-direction:column;gap:12px;}\n.spot-list .row{display:flex;gap:12px;align-items:flex-start;font-size:16px;color:var(--ink-2);}\n.spot-list .row svg{width:19px;height:19px;color:var(--ochre-deep);flex:0 0 auto;margin-top:2px;}\n.spot-media{display:flex;justify-content:center;}\n\n/* screenshot slot framing (easy to swap for real images) */\n.shot{\n  position:relative;border-radius:20px;background:var(--card);\n  border:1px solid var(--line);box-shadow:0 30px 60px -30px rgba(27,26,23,.4);\n  overflow:hidden;width:100%;\n}\n.shot-tag{\n  position:absolute;top:10px;right:10px;z-index:3;font-family:var(--mono);font-size:9.5px;\n  letter-spacing:.05em;color:var(--muted);background:rgba(248,244,236,.85);\n  border:1px dashed var(--line-2);border-radius:6px;padding:3px 7px;text-transform:uppercase;\n}\n\n/* composer mockup card */\n.cmp-card{padding:18px;}\n.cmp-card h5{margin:0 0 4px;font-family:var(--serif);font-size:17px;font-weight:600;}\n.cmp-card .cmp-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:14px;}\n.cmp-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:var(--paper);margin-bottom:9px;}\n.cmp-item .ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:#fff;}\n.cmp-item .ico svg{width:16px;}\n.cmp-item .nm{flex:1;min-width:0;}\n.cmp-item .nm b{font-size:14px;font-weight:600;display:block;}\n.cmp-item .nm span{font-size:11.5px;color:var(--muted);}\n.cmp-item .tok{font-family:var(--mono);font-size:11px;color:var(--ink-2);}\n.cmp-item.locked{background:var(--card-2);}\n.cmp-item.locked .lk{width:13px;color:var(--muted);}\n.budget{margin-top:14px;}\n.budget .bar{height:8px;border-radius:5px;background:var(--card-2);overflow:hidden;border:1px solid var(--line);}\n.budget .bar i{display:block;height:100%;width:54%;background:linear-gradient(90deg,var(--ochre),#e0982f);}\n.budget .lab{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:7px;}\n.budget .lab b{color:var(--ink-2);font-weight:600;}\n\n/* hats grid mockup */\n.hats-card{padding:20px;}\n.hats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}\n.hatcell{aspect-ratio:1;border-radius:14px;border:1px solid var(--line);background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;}\n.hatcell .hatmark{width:38px;height:28px;}\n.hatcell.sel{border-color:var(--ochre);box-shadow:0 0 0 2px rgba(207,122,18,.25);background:var(--card-2);}\n.hatcell .nm{font-size:10.5px;color:var(--muted);font-weight:600;}\n\n/* user picker mockup */\n.pick-card{padding:24px 20px;text-align:center;}\n.pick-card h5{font-family:var(--serif);font-size:20px;font-weight:600;margin:0 0 4px;}\n.pick-card .pk-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}\n.pick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}\n.member{display:flex;flex-direction:column;align-items:center;gap:9px;padding:16px 8px;border-radius:16px;border:1px solid transparent;}\n.member.active{border-color:var(--line);background:var(--paper);}\n.member .av{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:25px;font-weight:600;color:#fff;}\n.member .mn{font-size:14px;font-weight:600;}\n.member .role{font-size:10.5px;color:var(--muted);font-family:var(--mono);}\n.pindots{display:flex;gap:9px;justify-content:center;margin-top:20px;}\n.pindots i{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--muted-2);}\n.pindots i.on{background:var(--ink);border-color:var(--ink);}\n\n/* macOS window mockup */\n.mac{border-radius:14px;overflow:hidden;border:1px solid var(--line-2);background:var(--card);box-shadow:0 40px 80px -36px rgba(27,26,23,.5);width:100%;}\n.mac-bar{height:38px;display:flex;align-items:center;gap:8px;padding:0 14px;background:var(--card-2);border-bottom:1px solid var(--line);}\n.mac-bar .dot{width:12px;height:12px;border-radius:50%;}\n.mac-bar .r{background:#ec6a5e;}.mac-bar .y{background:#f3bf4f;}.mac-bar .g{background:#61c454;}\n.mac-bar .addr{margin-left:14px;font-family:var(--mono);font-size:11px;color:var(--muted);}\n.mac-body{display:flex;min-height:260px;}\n.mac-side{width:128px;border-right:1px solid var(--line);padding:14px 10px;background:var(--card-2);flex:0 0 auto;}\n.mac-side .grp{font-family:var(--mono);font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:14px 6px 7px;}\n.mac-side .grp:first-child{margin-top:0;}\n.mac-side .it{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;font-size:12.5px;color:var(--ink-2);}\n.mac-side .it.on{background:var(--ink);color:var(--paper);}\n.mac-side .it .hatmark{width:17px;height:13px;}\n.mac-side .it .d{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}\n.mac-main{flex:1;padding:20px 22px;}\n\n/* ---------- feature grid ---------- */\n.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}\n.fcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 24px;transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease;}\n.fcard:hover{transform:translateY(-3px);box-shadow:0 18px 36px -22px rgba(27,26,23,.4);border-color:var(--line-2);}\n.fcard .fi{width:44px;height:44px;border-radius:12px;background:var(--paper-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;margin-bottom:18px;color:var(--oxblood);}\n.fcard .fi svg{width:22px;height:22px;}\n.fcard h4{font-family:var(--serif);font-size:21px;font-weight:600;margin:0 0 9px;}\n.fcard p{font-size:15px;color:var(--ink-2);line-height:1.55;}\n\n/* ---------- download ---------- */\n.dl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:8px;}\n.dl-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:30px 26px;display:flex;flex-direction:column;}\n.dl-card.feat{border-color:var(--ink);box-shadow:0 24px 50px -30px rgba(27,26,23,.5);position:relative;}\n.dl-tag{position:absolute;top:-12px;left:26px;background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:8px;}\n.dl-ico{width:54px;height:54px;border-radius:14px;background:var(--paper-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;margin-bottom:18px;color:var(--ink);}\n.dl-ico svg{width:28px;height:28px;}\n.dl-card h4{font-family:var(--serif);font-size:23px;font-weight:600;margin:0 0 7px;}\n.dl-card .req{font-family:var(--mono);font-size:11px;color:var(--ochre-deep);margin-bottom:12px;letter-spacing:.03em;}\n.dl-card p{font-size:15px;color:var(--ink-2);line-height:1.55;flex:1;}\n.dl-card .btn{margin-top:22px;width:100%;}\n.dl-meta{margin-top:12px;font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;}\n\n/* connect diagram */\n.connect{margin-top:64px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:34px;}\n.connect h4{font-family:var(--serif);font-size:22px;font-weight:600;text-align:center;margin:0 0 6px;}\n.connect .csub{text-align:center;color:var(--ink-2);font-size:15.5px;margin-bottom:30px;}\n.cflow{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;}\n.cnode{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;min-width:120px;}\n.cnode .cbox{width:74px;height:74px;border-radius:18px;background:var(--paper);border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;color:var(--ink);}\n.cnode .cbox svg{width:34px;height:34px;}\n.cnode .cl{font-size:13.5px;font-weight:600;}\n.cnode .cd{font-family:var(--mono);font-size:10.5px;color:var(--muted);}\n.carrow{display:flex;flex-direction:column;align-items:center;color:var(--muted);font-family:var(--mono);font-size:10px;}\n.carrow svg{width:38px;color:var(--line-2);}\n\n/* ---------- philosophy band ---------- */\n.philo{background:var(--dark);color:var(--paper);padding:104px 0;}\n.philo .wrap{max-width:840px;text-align:center;}\n.philo .eyebrow{color:#e0982f;}\n.philo blockquote{margin:0;font-family:var(--serif);font-size:clamp(26px,3.6vw,40px);line-height:1.28;font-weight:500;letter-spacing:-.01em;}\n.philo blockquote em{color:#e0982f;font-style:italic;}\n.philo .attrib{margin-top:28px;font-family:var(--mono);font-size:13px;color:var(--muted-2);letter-spacing:.02em;}\n\n/* why-a-mac note inside philosophy band */\n.philo-note{max-width:760px;margin:60px auto 0;text-align:left;border-top:1px solid rgba(255,255,255,.14);padding-top:42px;}\n.philo-note-h{font-family:var(--serif);font-size:clamp(22px,2.6vw,28px);font-weight:600;color:var(--paper);margin:0 0 20px;letter-spacing:-.01em;}\n.philo-note p{color:var(--muted-2);font-size:17px;line-height:1.64;}\n.philo-note p + p{margin-top:18px;}\n.philo-note p em{color:#e0982f;font-style:italic;}\n\n/* ---------- maker's note ---------- */\n.maker{background:var(--paper-2);padding:96px 0;}\n.maker .wrap{max-width:760px;}\n.maker .eyebrow{margin-bottom:22px;}\n.maker-note{font-family:var(--serif);font-size:clamp(21px,2.4vw,26px);line-height:1.5;color:var(--ink);font-weight:400;letter-spacing:-.005em;}\n.maker-sign{font-style:italic;color:var(--oxblood);white-space:nowrap;}\n.maker-strip{margin-top:32px;font-family:var(--mono);font-size:12.5px;color:var(--muted);letter-spacing:.02em;}\n.maker-strip a{color:var(--ochre-deep);font-weight:600;border-bottom:1px solid var(--line-2);transition:color .15s ease,border-color .15s ease;}\n.maker-strip a:hover{color:var(--ink);border-color:var(--muted-2);}\n\n/* ---------- footer ---------- */\n.foot{background:var(--dark-2);color:var(--muted-2);padding:64px 0 40px;}\n.foot-top{display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.08);}\n.foot .brand{color:var(--paper);}\n.foot .brand .hatmark{color:var(--paper);}\n.foot-tag{margin-top:14px;font-size:14px;max-width:30ch;line-height:1.5;}\n.foot-cols{display:flex;gap:64px;flex-wrap:wrap;}\n.foot-col h6{margin:0 0 14px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;}\n.foot-col a{display:block;font-size:14.5px;color:var(--muted-2);margin-bottom:9px;transition:color .15s ease;}\n.foot-col a:hover{color:var(--paper);}\n.foot-bot{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;padding-top:28px;font-size:13px;color:var(--muted);}\n\n/* ---------- reveal (progressive enhancement: hidden only when JS arms it) ---------- */\n.reveal-ready .reveal{opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1);}\n.reveal.in{opacity:1;transform:none;}\n@media (prefers-reduced-motion:reduce){.reveal-ready .reveal{opacity:1;transform:none;transition:none;}}\n\n/* ---------- responsive ---------- */\n@media (max-width:1000px){\n  .hero-grid{grid-template-columns:1fr;gap:48px;}\n  .hero-phone{order:-1;}\n  .spot{grid-template-columns:1fr;gap:36px;}\n  .spot.flip .spot-media{order:0;}\n  .fgrid{grid-template-columns:repeat(2,1fr);}\n  .dl-grid{grid-template-columns:1fr;max-width:460px;margin:0 auto;}\n  .dl-card.feat{order:-1;}\n}\n@media (max-width:680px){\n  .section{padding:76px 0;}\n  .hero{padding:48px 0 72px;}\n  .nav-links{display:none;}\n  .nav-toggle{display:flex;}\n  .fgrid{grid-template-columns:1fr;}\n  .hats-grid{grid-template-columns:repeat(4,1fr);}\n  .foot-top{flex-direction:column;gap:32px;}\n  .cflow{flex-direction:column;}\n  .carrow svg{transform:rotate(90deg);}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- reusable hat symbol -->\n<svg width=\"0\" height=\"0\" style=\"position:absolute\" aria-hidden=\"true\">\n  <symbol id=\"hat\" viewBox=\"83 83.2 1498.8 1103.5\">\n    <path d=\"M 795 89.7 C 694.4 92.5 599.3 107.7 524.8 132.9 C 498.2 141.9 485.5 147.1 461.5 159 C 378.7 199.7 329.4 251.5 301.2 327.5 C 282.5 377.7 277.7 440.3 286 523.5 C 289.3 555.7 308.6 680.2 319 735.3 C 321.1 747 324.1 763.2 325.5 771.5 C 329.3 794.6 330.5 797.2 341.7 808.5 C 371.6 838.7 439.2 861.6 533.5 873.4 C 584.8 879.8 617.8 881.5 688.5 881.5 C 787.4 881.4 875.6  viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"7\" r=\"3.2\"><\u002Fcircle><path d=\"M5.5 20a6.5 6.5 0 0 1 13 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"chat\">\n            <div class=\"bubble-u\">Tell me a story about a whale who collects sounds.<\u002Fdiv>\n            <div class=\"bubble-m\">\n              <p>Once, in the deep grey water off the coast, there lived a young whale named <strong>Brume<\u002Fstrong> who kept the sounds she loved in a coral chest…<\u002Fp>\n              <div class=\"li\">the creak of a harbour at dawn<\u002Fdiv>\n              <div class=\"li\">a child laughing two bays over<\u002Fdiv>\n              <p>She never kept a sound she hadn't been <em>given<\u002Fem>. That was the whole of her magic.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"composer\">\n            <div class=\"ph\">Ask the Storyteller something…<\u002Fdiv>\n            <div class=\"tools\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5 12 20.5a5 5 0 0 1-7-7l9-9a3.3 3.3 0 0 1 5 4.6l-9 9a1.7 1.7 0 0 1-2.4-2.4l8.2-8.2\"><\u002Fpath><\u002Fsvg>\n              <span class=\"sp\"><\u002Fspan>\n              <span class=\"pill\">Claude Sonnet 4.5 <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <span class=\"hatbtn\"><svg class=\"hatmark\"><use href=\"#hat\"><\u002Fuse><\u002Fsvg><span class=\"bdg\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n t 3: shared device -->\n    <div class=\"spot reveal\">\n      <div class=\"spot-copy\">\n        <div class=\"eyebrow\">One device, every mind<\u002Fdiv>\n        <h3>One iPad. Everyone's own Maurice.<\u002Fh3>\n        <p>Every member has their own conversations, notes and memories on the same device. Switching is a tap and a PIN — no logging out, no separate accounts to juggle. The kids share a screen without sharing a brain.<\u002Fp>\n        <div class=\"spot-list\">\n          <div class=\"row\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg> Per-member history, notes and personas<\u002Fdiv>\n          <div class=\"row\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg> Host guests — and be a guest in another household<\u002Fdiv>\n          <div class=\"row\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg> Roles for adults, children and guests<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"spot-media\">\n        <div class=\"shot pick-card\">\n          <span class=\"shot-tag\">mockup<\u002Fspan>\n          <h5>Who's here?<\u002Fh5>\n          <div class=\"pk-sub\">Tap your face to continue<\u002Fdiv>\n          <div class=\"pick-grid\">\n            <div class=\"member active\"><span class=\"av\" style=\"background:#7c2d23\">P<\u002Fspan><span class=\"mn\">Paola<\u002Fspan><span class=\"role\">admin<\u002Fspan><\u002Fdiv>\n            <div class=\"member\"><span class=\"av\" style=\"background:#2f6f9e\">M<\u002Fspan><span class=\"mn\">Marc<\u002Fspan><span class=\"role\">standard<\u002Fspan><\u002Fdiv>\n            <div class=\"member\"><span class=\"av\" style=\"background:#2f7d54\">L<\u002Fspan><span class=\"mn\">Léo<\u002Fspan><span class=\"role\">child · 11<\u002Fspan><\u002Fdiv>\n            <div class=\"member\"><span class=\"av\" style=\"background:#c98a1e\">N<\u002Fspan><span class=\"mn\">Noé<\u002Fspan><span class=\"role\">child · 9<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"pindots\"><i class=\"on\"><\u002Fi><i class=\"on\"><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= FEATURE GRID ========================= -->\n<section class=\"section section--alt\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <div class=\"eyebrow\">And more<\u002Fdiv>\n      <h2>Built like a home, not a dashboard.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"fgrid\">\n      <div class=\"fcard reveal\">\n        <div class=\"fi\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15V6a2 2 0 0 0-2-2H9\"><\u002Fpath><path d=\"M3 9v9a2 2 0 0 0 2 2h10\"><\u002Fpath><path d=\"m7 13 3 3 7-7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Bring your history<\u002Fh4>\n        <p>Import your existing threads from Claude and ChatGPT — the official export <span class=\"kbd\">.zip<\u002Fspan>s — so your past conversations come with you, searchable.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"fcard reveal\">\n        <div class=\"fi\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 12h8M8 8h8M8 16h5\"><\u002Fpath><path d=\"M21 12a9 9 0 1 1-4-7.5L21 5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Group chat, AI in the room<\u002Fh4>\n        <p>Several members can talk in one conversation and summon Maurice with <span class=\"kbd\">@claude<\u002Fspan>. He answers only when called — using the notes loaded into the room.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"fcard reveal\">\n        <div class=\"fi\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 21V8l9-5 9 5v13\"><\u002Fpath><path d=\"M9 21v-6h6v6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Households &amp; guests<\u002Fh4>\n        <p>Run several households on one device, with guests who keep full capability but a limited reach — an explicit allow-list of people and personas.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"fcard reveal\">\n        <div class=\"fi\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"12\" rx=\"2\"><\u002Frect><path d=\"M8 20h8M12 16v4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Native apps, no Docker<\u002Fh4>\n        <p>Real SwiftUI apps for iPhone, iPad and Mac — and a single server process on your Mac. No container stack to assemble, no ops to keep alive.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"fcard reveal\">\n        <div class=\"fi\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 3a9 9 0 0 0 0 18M3 12h18\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Your models, your choice<\u002Fh4>\n        <p>Anthropic, OpenAI and Mistral in the cloud, or local models through Ollama — switch per conversation, grouped by provider.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"fcard reveal\">\n        <div class=\"fi\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 20h10M9 16l-2 4M15 16l2 4\"><\u002Fpath><rect x=\"4\" y=\"3\" width=\"16\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M4 11c4-3 12-3 16 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>A browsable web garden<\u002Fh4>\n        <p>The same Markdown becomes a themeable website — private notes encrypted at rest, with four hand-made garden themes to choose from.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= DOWNLOAD ========================= -->\n<section class=\"section\" id=\"download\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <div class=\"eyebrow\">Get Chez Maurice<\u002Fdiv>\n      <h2>Three pieces. Start with the server.<\u002Fh2>\n      <p>The server is the engine — it runs on your home Mac and holds everything. The apps are how you reach it.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"dl-grid\">\n      <!-- server (featured / required) -->\n      <div class=\"dl-card feat reveal\">\n        <span class=\"dl-tag\">Start here<\u002Fspan>\n        <div class=\"dl-ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"7\" rx=\"2\"><\u002Frect><rect x=\"3\" y=\"13\" width=\"18\" height=\"7\" rx=\"2\"><\u002Frect><path d=\"M7 7.5h.01M7 16.5h.01\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Chez Maurice Server<\u002Fh4>\n        <div class=\"req\">Required · macOS · notarized .app<\u002Fdiv>\n        <p>The chat engine, the garden and your data. Runs quietly on your home Mac. Download, open, done — no build from source.<\u002Fp>\n        <a class=\"btn btn-primary\" href=\"#\" data-dl=\"server\">\n          <svg class=\"ic\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12m0 0 4-4m-4 4-4-4\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>\n          Download Server\n        <\u002Fa>\n        <div class=\"dl-meta\">v1.0 · Apple silicon · ~38 MB<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- mac client -->\n      <div class=\"dl-card reveal\">\n        <div class=\"dl-ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M8 21h8M12 17v4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>Chez Maurice for Mac<\u002Fh4>\n        <div class=\"req\">macOS client<\u002Fdiv>\n        <p>The full desktop experience — chat, hats, the composer, gardens and files — in a native Mac window. Pairs to your server.<\u002Fp>\n        <a class=\"btn btn-ghost\" href=\"#\" data-dl=\"mac\">\n          <svg class=\"ic\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12m0 0 4-4m-4 4-4-4\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>\n          Download for Mac\n        <\u002Fa>\n        <div class=\"dl-meta\">v1.0 · Apple silicon · ~24 MB<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ios testflight -->\n      <div class=\"dl-card reveal\">\n        <div class=\"dl-ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"6\" y=\"2\" width=\"12\" height=\"20\" rx=\"3\"><\u002Frect><path d=\"M11 18h2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h4>iPhone &amp; iPad<\u002Fh4>\n        <div class=\"req\">via TestFlight<\u002Fdiv>\n        <p>The same app on iPhone and iPad — built as one universal app. Join the TestFlight beta to install it on your devices.<\u002Fp>\n        <a class=\"btn btn-ghost\" href=\"#\" data-dl=\"ios\">\n          <svg class=\"ic\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2 3 7v10l9 5 9-5V7l-9-5Z\"><\u002Fpath><path d=\"m12 7 5 2.8v4.4L12 17l-5-2.8V9.8L12 7Z\"><\u002Fpath><\u002Fsvg>\n          Join the TestFlight\n        <\u002Fa>\n        <div class=\"dl-meta\">iOS 17+ · iPhone &amp; iPad<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- how it connects -->\n    <div class=\"connect reveal\">\n      <h4>How it all connects<\u002Fh4>\n      <p class=\"csub\">Your apps talk to the server on your Mac over a private HTTPS link you choose.<\u002Fp>\n      <div class=\"cflow\">\n        <div class=\"cnode\">\n          <div class=\"cbox\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"7\" rx=\"2\"><\u002Frect><rect x=\"3\" y=\"13\" width=\"18\" height=\"7\" rx=\"2\"><\u002Frect><path d=\"M7 7.5h.01M7 16.5h.01\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"cl\">Server on your Mac<\u002Fdiv>\n          <div class=\"cd\">data · garden · LLM calls<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"carrow\">\n          <svg viewBox=\"0 0 48 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M2 12h40m0 0-7-6m7 6-7 6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <span>Tailscale / Cloudflare<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"cnode\">\n          <div class=\"cbox\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"7\" y=\"2\" width=\"10\" height=\"20\" rx=\"2.5\"><\u002Frect><rect x=\"2\" y=\"6\" width=\"3\" height=\"12\" rx=\"1.2\" opacity=\".5\"><\u002Frect><rect x=\"19\" y=\"6\" width=\"3\" height=\"12\" rx=\"1.2\" opacity=\".5\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n          <div class=\"cl\">Your devices<\u002Fdiv>\n          <div class=\"cd\">iPhone · iPad · Mac<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= PHILOSOPHY ========================= -->\n<section class=\"philo\" id=\"philosophy\">\n  <div class=\"wrap reveal\">\n    <div class=\"eyebrow\">The whole point<\u002Fdiv>\n    <blockquote>Maurice only knows what you've shown him. That limitation isn't a bug — it's the thing you can <em>tame<\u002Fem>. He becomes yours through the relationship you build.<\u002Fblockquote>\n    <div class=\"attrib\">A father building an AI for his children · open-source · small on purpose<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"wrap reveal\">\n    <div class=\"philo-note\">\n      <h3 class=\"philo-note-h\">Why a Mac, and why no Docker<\u002Fh3>\n      <p>Maurice runs as one signed, notarized app on a Mac you already own — open it and it's running. No container stack to assemble, no compose file, no ops to keep alive at 2 a.m. That's a deliberate trade: a household shouldn't have to run infrastructure to own its own assistant. A Mac mini sitting quietly on a shelf is the whole deployment.<\u002Fp>\n      <p>Mac-first also means the clients can be real SwiftUI apps rather than a browser tab pretending to be one. The cost is honest — if you want this on a Linux box or a NAS today, you can't yet. The server is plain Bun, SQLite and Markdown with nothing Apple-specific at its core, so a Linux build is on the table; it just isn't the thing built for the household I'm shipping to first.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= MAKER'S NOTE ========================= -->\n<section class=\"maker\" id=\"maker\">\n  <div class=\"wrap reveal\">\n    <div class=\"eyebrow\">Who's behind this<\u002Fdiv>\n    <p class=\"maker-note\">Maurice is made by one person — me. I started it as a household AI for my own family, on hardware I already owned, because I didn't want the people I live with to be the product. It's open-source and it's early: a solo project, shipped honestly, not a startup pretending to be bigger than it is. You'll find rough edges. You'll also find that nothing here mines you, upsells you, or phones home. <span class=\"maker-sign\">— Candide<\u002Fspan><\u002Fp>\n    <p class=\"maker-strip\">Solo-built &nbsp;·&nbsp; in beta &nbsp;·&nbsp; maintained in the open &nbsp;·&nbsp; <a href=\"https://candide.me\" target=\"_blank\" rel=\"noopener\">candide.me<\u002Fa><\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================= FOOTER ========================= -->\n<footer class=\"foot\">\n  <div class=\"wrap\">\n    <div class=\"foot-top\">\n      <div>\n        <a class=\"brand\" href=\"#top\"><svg class=\"hatmark\"><use href=\"#hat\"><\u002Fuse><\u002Fsvg> Chez Maurice<\u002Fa>\n        <p class=\"foot-tag\">A household AI with a tamed memory. Your stuff stays yours, and you're the one in charge.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"foot-cols\">\n        <div class=\"foot-col\">\n          <h6>Product<\u002Fh6>\n          <a href=\"#features\">Features<\u002Fa>\n          <a href=\"#download\">Download<\u002Fa>\n          <a href=\"#philosophy\">Philosophy<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"foot-col\">\n          <h6>Get it<\u002Fh6>\n          <a href=\"#download\" data-dl=\"server\">Server (Mac)<\u002Fa>\n          <a href=\"#download\" data-dl=\"mac\">Mac client<\u002Fa>\n          <a href=\"#download\" data-dl=\"ios\">iOS TestFlight<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"foot-col\">\n          <h6>Open source<\u002Fh6>\n          <a href=\"https://github.com\" target=\"_blank\" rel=\"noopener\">GitHub<\u002Fa>\n          <a href=\"#\">License<\u002Fa>\n          <a href=\"#\">Documentation<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bot\">\n      <span>© 2026 Chez Maurice · Free &amp; open-source<\u002Fspan>\n      <span>Built for a household first, open-sourced second.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script src=\"e9f7cc6b-bb0b-456f-9609-78e9c862ec9f\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
