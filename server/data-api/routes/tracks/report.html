<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    /* === Reset & Base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Typography scale — perfect fourth (1.333) */
      --step--2: 0.75rem;
      --step--1: 0.875rem;
      --step-0: 1.0625rem;
      --step-1: 1.25rem;
      --step-2: 1.5rem;
      --step-3: 1.875rem;
      --step-4: 2.25rem;
      --step-5: 3rem;

      /* Fonts */
      --font-serif: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Consolas, monospace;

      /* Colors — warm ink on paper */
      --ink: #1a1a1a;
      --ink-light: #4a4a4a;
      --ink-muted: #6b6b6b;
      --ink-faint: #999;
      --paper: #fafaf8;
      --paper-warm: #f5f3ef;
      --paper-rule: #e0ddd6;
      --accent: #8b4513;
      --accent-light: #b8860b;
      --link: #2c5282;
      --link-hover: #1a365d;

      /* Spacing */
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2.5rem;
      --space-2xl: 4rem;
      --space-3xl: 6rem;

      /* Layout */
      --measure: 65ch;
      --sidebar: 220px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #e8e6e1;
        --ink-light: #bbb8b0;
        --ink-muted: #8a8780;
        --ink-faint: #6b6860;
        --paper: #1a1915;
        --paper-warm: #22211c;
        --paper-rule: #3a3830;
        --accent: #d4a064;
        --accent-light: #e0c080;
        --link: #7bb0d4;
        --link-hover: #a0ccee;
      }
    }

    html {
      font-size: 100%;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-serif);
      font-size: var(--step-0);
      line-height: 1.65;
      color: var(--ink);
      background: var(--paper);
    }

    /* === Typography === */
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-sans);
      font-weight: 700;
      line-height: 1.2;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    h1 { font-size: var(--step-5); margin-bottom: var(--space-md); }
    h2 { font-size: var(--step-3); margin-top: var(--space-2xl); margin-bottom: var(--space-lg); }
    h3 { font-size: var(--step-2); margin-top: var(--space-xl); margin-bottom: var(--space-md); }
    h4 { font-size: var(--step-1); margin-top: var(--space-lg); margin-bottom: var(--space-sm); }

    p { margin-bottom: var(--space-md); max-width: var(--measure); }
    p + p { margin-top: 0; }

    strong { font-weight: 700; }
    em { font-style: italic; }

    a { color: var(--link); text-decoration: none; text-underline-offset: 2px; }
    a:hover { color: var(--link-hover); text-decoration: underline; }

    blockquote {
      margin: var(--space-lg) 0;
      padding: var(--space-md) var(--space-lg);
      border-left: 3px solid var(--accent);
      color: var(--ink-light);
      font-style: italic;
      max-width: var(--measure);
    }

    ul, ol { padding-left: 1.4em; margin-bottom: var(--space-md); max-width: var(--measure); }
    li { margin-bottom: var(--space-xs); }
    li::marker { color: var(--ink-muted); }

    hr {
      border: none;
      border-top: 1px solid var(--paper-rule);
      margin: var(--space-2xl) 0;
    }

    /* === Page Layout === */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Masthead --- */
    .masthead {
      border-bottom: 1px solid var(--paper-rule);
      padding: var(--space-lg) var(--space-xl);
    }

    .masthead-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .masthead-brand {
      font-family: var(--font-sans);
      font-size: var(--step--1);
      font-weight: 600;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .masthead-date {
      font-family: var(--font-sans);
      font-size: var(--step--2);
      color: var(--ink-faint);
      letter-spacing: 0.04em;
    }

    /* --- Hero / Cover --- */
    .hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: var(--space-3xl) var(--space-xl) var(--space-2xl);
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
      max-width: 20ch;
      margin-bottom: var(--space-lg);
    }

    .hero-subtitle {
      font-family: var(--font-serif);
      font-size: var(--step-1);
      color: var(--ink-light);
      max-width: 55ch;
      line-height: 1.5;
    }

    .hero-meta {
      margin-top: var(--space-lg);
      display: flex;
      gap: var(--space-lg);
      font-family: var(--font-sans);
      font-size: var(--step--2);
      color: var(--ink-muted);
    }

    .hero-meta span {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }

    .hero-rule {
      border: none;
      border-top: 2px solid var(--ink);
      width: 60px;
      margin: var(--space-xl) 0 0;
    }

    /* --- Main Content Area --- */
    .content-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 var(--space-xl);
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      gap: var(--space-2xl);
    }

    /* --- Sidebar / TOC --- */
    .sidebar {
      position: sticky;
      top: var(--space-xl);
      align-self: start;
      max-height: calc(100vh - 3rem);
      overflow-y: auto;
    }

    .toc {
      font-family: var(--font-sans);
    }

    .toc-label {
      font-size: var(--step--2);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-muted);
      margin-bottom: var(--space-md);
    }

    .toc-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .toc-list li {
      margin-bottom: 0;
    }

    .toc-list a {
      display: block;
      padding: var(--space-xs) 0;
      font-size: var(--step--1);
      font-weight: 500;
      color: var(--ink-muted);
      text-decoration: none;
      border-left: 2px solid transparent;
      padding-left: var(--space-md);
      transition: color 0.15s, border-color 0.15s;
    }

    .toc-list a:hover,
    .toc-list a.active {
      color: var(--ink);
      border-left-color: var(--accent);
    }

    .toc-list .toc-sub {
      padding-left: calc(var(--space-md) + var(--space-sm));
      font-size: var(--step--2);
      font-weight: 400;
    }

    /* --- Article / Main Column --- */
    .main-col {
      min-width: 0;
      padding-bottom: var(--space-3xl);
    }

    /* --- Track Section (Digest) --- */
    .track-section {
      margin-bottom: var(--space-3xl);
    }

    .track-header {
      margin-bottom: var(--space-xl);
    }

    .track-label {
      font-family: var(--font-sans);
      font-size: var(--step--2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: var(--space-xs);
    }

    .track-header h2 {
      margin-top: var(--space-xs);
      margin-bottom: var(--space-sm);
    }

    .track-perspective {
      font-size: var(--step--1);
      color: var(--ink-muted);
      font-style: italic;
      max-width: 55ch;
      line-height: 1.5;
    }

    /* --- Article Body Prose --- */
    .prose {
      max-width: var(--measure);
    }

    .prose > * + * {
      margin-top: var(--space-md);
    }

    .prose h2 {
      font-size: var(--step-2);
      padding-top: var(--space-md);
      border-top: 1px solid var(--paper-rule);
    }

    .prose h3 {
      font-size: var(--step-1);
      color: var(--ink-light);
    }

    /* Drop cap for first paragraph in each section */
    .prose > p:first-of-type::first-letter {
      font-size: 3.2em;
      float: left;
      font-weight: 700;
      line-height: 0.8;
      margin: 0.1em 0.12em 0 0;
      color: var(--ink);
      font-family: var(--font-serif);
    }

    /* --- Open Threads --- */
    .open-threads {
      margin-top: var(--space-xl);
      padding: var(--space-lg);
      background: var(--paper-warm);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
    }

    .open-threads-title {
      font-family: var(--font-sans);
      font-size: var(--step--1);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: var(--space-sm);
    }

    .open-threads p,
    .open-threads li {
      font-size: var(--step--1);
      color: var(--ink-light);
    }

    /* --- Sources / Evidence --- */
    .sources {
      margin-top: var(--space-xl);
    }

    .sources-title {
      font-family: var(--font-sans);
      font-size: var(--step--1);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      margin-bottom: var(--space-md);
    }

    .source-list {
      list-style: none;
      padding: 0;
    }

    .source-item {
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--paper-rule);
      display: flex;
      gap: var(--space-sm);
      align-items: baseline;
    }

    .source-item:last-child { border-bottom: none; }

    .source-type {
      font-family: var(--font-sans);
      font-size: var(--step--2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-faint);
      flex-shrink: 0;
      width: 50px;
    }

    .source-title {
      font-size: var(--step--1);
    }

    .source-title a { color: var(--link); }

    /* --- Evidence Log (Deep Research) --- */
    .evidence-log {
      margin-top: var(--space-2xl);
    }

    .evidence-step {
      margin-bottom: var(--space-xl);
      padding: var(--space-lg);
      background: var(--paper-warm);
      border-radius: 8px;
    }

    .evidence-step-header {
      font-family: var(--font-sans);
      font-size: var(--step--1);
      font-weight: 600;
      color: var(--ink);
      margin-bottom: var(--space-xs);
    }

    .evidence-step-reason {
      font-size: var(--step--2);
      color: var(--ink-muted);
      font-style: italic;
      margin-bottom: var(--space-md);
    }

    .evidence-result {
      padding: var(--space-sm) 0;
      border-top: 1px solid var(--paper-rule);
    }

    .evidence-result-title {
      font-size: var(--step--1);
      font-weight: 600;
    }

    .evidence-result-score {
      font-family: var(--font-mono);
      font-size: var(--step--2);
      color: var(--ink-faint);
    }

    .evidence-result-excerpt {
      font-size: var(--step--2);
      color: var(--ink-light);
      margin-top: var(--space-xs);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* --- Signal Cards --- */
    .signal-card {
      padding: var(--space-md) var(--space-lg);
      margin-bottom: var(--space-md);
      border: 1px solid var(--paper-rule);
      border-radius: 8px;
      background: var(--paper);
    }

    .signal-meta {
      display: flex;
      gap: var(--space-md);
      font-family: var(--font-sans);
      font-size: var(--step--2);
      color: var(--ink-muted);
      margin-bottom: var(--space-xs);
    }

    .signal-badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 3px;
      background: var(--paper-warm);
      font-size: var(--step--2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .signal-card h4 {
      margin-top: var(--space-xs);
      margin-bottom: var(--space-xs);
      font-size: var(--step-0);
    }

    .signal-excerpt {
      font-size: var(--step--1);
      color: var(--ink-light);
      line-height: 1.5;
    }

    /* --- Digest Nav (track links at top) --- */
    .digest-nav {
      display: flex;
      gap: var(--space-md);
      flex-wrap: wrap;
      margin-bottom: var(--space-2xl);
      padding-bottom: var(--space-lg);
      border-bottom: 1px solid var(--paper-rule);
    }

    .digest-nav a {
      font-family: var(--font-sans);
      font-size: var(--step--1);
      font-weight: 600;
      color: var(--ink-muted);
      padding: var(--space-xs) var(--space-md);
      border: 1px solid var(--paper-rule);
      border-radius: 100px;
      text-decoration: none;
      transition: all 0.15s;
    }

    .digest-nav a:hover {
      color: var(--ink);
      border-color: var(--ink-muted);
      text-decoration: none;
    }

    /* --- "Read Full Report" link --- */
    .read-more {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      font-family: var(--font-sans);
      font-size: var(--step--1);
      font-weight: 600;
      color: var(--accent);
      margin-top: var(--space-md);
      text-decoration: none;
    }

    .read-more:hover { text-decoration: underline; color: var(--accent-light); }
    .read-more::after { content: '\2192'; }

    /* --- Footer --- */
    .page-footer {
      margin-top: auto;
      padding: var(--space-lg) var(--space-xl);
      border-top: 1px solid var(--paper-rule);
      text-align: center;
      font-family: var(--font-sans);
      font-size: var(--step--2);
      color: var(--ink-faint);
    }

    /* === Responsive === */
    @media (max-width: 900px) {
      .content-wrap {
        grid-template-columns: 1fr;
        padding: 0 var(--space-lg);
      }

      .sidebar {
        position: static;
        max-height: none;
        border-bottom: 1px solid var(--paper-rule);
        padding-bottom: var(--space-lg);
        margin-bottom: var(--space-lg);
      }

      .toc-list {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-sm);
      }

      .toc-list a {
        border-left: none;
        padding-left: 0;
        padding: var(--space-xs) var(--space-sm);
        border: 1px solid var(--paper-rule);
        border-radius: 4px;
        font-size: var(--step--2);
      }

      .toc-list .toc-sub { display: none; }

      .hero {
        padding: var(--space-xl) var(--space-lg) var(--space-lg);
      }

      .hero h1 { font-size: var(--step-4); }
    }

    @media (max-width: 600px) {
      :root {
        --step-0: 1rem;
        --step-1: 1.125rem;
        --step-2: 1.375rem;
        --step-3: 1.625rem;
        --step-4: 2rem;
        --step-5: 2.5rem;
      }

      .masthead-inner { flex-direction: column; gap: var(--space-xs); }
      .hero { padding: var(--space-lg) var(--space-md); }
      .content-wrap { padding: 0 var(--space-md); }
      .hero-meta { flex-direction: column; gap: var(--space-xs); }
      .digest-nav { gap: var(--space-sm); }
    }

    /* === Progressive Disclosure === */
    details {
      margin: var(--space-md) 0;
    }

    details summary {
      font-family: var(--font-sans);
      font-size: var(--step--1);
      font-weight: 600;
      cursor: pointer;
      color: var(--ink-light);
      padding: var(--space-sm) 0;
      list-style: none;
    }

    details summary::-webkit-details-marker { display: none; }

    details summary::before {
      content: '\25B6';
      display: inline-block;
      margin-right: var(--space-sm);
      font-size: 0.6em;
      transition: transform 0.2s;
    }

    details[open] summary::before { transform: rotate(90deg); }

    details > *:not(summary) {
      padding-left: var(--space-lg);
    }

    /* === Print === */
    @media print {
      .sidebar, .masthead, .page-footer { display: none; }
      .content-wrap { display: block; max-width: 100%; }
      .main-col { padding-bottom: 0; }
      body { font-size: 11pt; }
      a { color: inherit; }
      a[href]::after { content: ' (' attr(href) ')'; font-size: 0.8em; color: #666; }
      .evidence-log { page-break-before: always; }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Masthead -->
    <header class="masthead">
      <div class="masthead-inner">
        <span class="masthead-brand">Akita Research</span>
        <span class="masthead-date">{{DATE}}</span>
      </div>
    </header>

    <!-- Hero -->
    <section class="hero">
      <h1>{{TITLE}}</h1>
      <p class="hero-subtitle">{{SUBTITLE}}</p>
      <div class="hero-meta">
        <span>{{PLAN_WINDOW}}</span>
        <span>{{TRACK_COUNT}} tracks</span>
      </div>
      <hr class="hero-rule" />
    </section>

    <!-- Main Content -->
    <div class="content-wrap">
      <!-- Sidebar TOC -->
      <aside class="sidebar">
        <nav class="toc">
          <div class="toc-label">Contents</div>
          <ul class="toc-list" id="toc">
            <!-- Populated by JS or server -->
          </ul>
        </nav>
      </aside>

      <!-- Article body -->
      <article class="main-col">

        <!-- Digest: track navigation pills -->
        <nav class="digest-nav" id="digest-nav">
          <!-- Populated per track -->
        </nav>

        <!-- Track sections (for digest) or single report content -->
        <div id="content">
          <!-- CONTENT GOES HERE -->
        </div>

      </article>
    </div>

    <footer class="page-footer">
      Generated by Akita Research Pipeline
    </footer>
  </div>

  <script>
    // Scroll-spy for TOC
    (function() {
      const tocLinks = document.querySelectorAll('.toc-list a');
      if (!tocLinks.length) return;

      const sections = [];
      tocLinks.forEach(link => {
        const id = link.getAttribute('href')?.replace('#', '');
        if (id) {
          const el = document.getElementById(id);
          if (el) sections.push({ el, link });
        }
      });

      function onScroll() {
        let current = sections[0];
        for (const s of sections) {
          if (s.el.getBoundingClientRect().top <= 80) current = s;
        }
        tocLinks.forEach(l => l.classList.remove('active'));
        if (current) current.link.classList.add('active');
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
  </script>
</body>
</html>
